server {
    listen 80;
    server_name api-suribeauty.bscxau.link;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-suribeauty.bscxau.link;

    ssl_certificate /etc/letsencrypt/live/api-suribeauty.bscxau.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-suribeauty.bscxau.link/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Tăng timeout cho upload file
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }
}
